name: Deploy Dashboard

on:
  push:
    branches: [main]
    paths:
      - "dashboard/**"
      - ".github/workflows/deploy-dashboard.yml"
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy Dashboard to Cloudflare Pages
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy dist --project-name bible-story-dashboard
        working-directory: dashboard
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: fd5b09ffec9792936392a2fdeddf8590
