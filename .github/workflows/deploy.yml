name: Deploy Worker

on:
  push:
    branches: [main]
    paths:
      - "cloudflare/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
    inputs:
      apply_schema:
        description: "Apply D1 schema before deploying"
        type: boolean
        default: false

jobs:
  deploy:
    name: Deploy Cloudflare Worker
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cloudflare

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Apply D1 schema
        if: github.event.inputs.apply_schema == 'true'
        run: npx wrangler d1 execute bible-videos-series-memory --file schema.sql --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: fd5b09ffec9792936392a2fdeddf8590

      - name: Deploy Worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: fd5b09ffec9792936392a2fdeddf8590
